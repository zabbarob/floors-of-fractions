<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floors of fractions</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      color: #111;
      background: #f7f8fb;
    }

    h1, .note {
      margin: 0 0 16px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
      text-align: right;
    }

    #tableContainer {
      max-height: 85vh;
      overflow-y: auto;
      margin-top: 16px;
    }

    table {
      width: auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 16px rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      overflow: hidden;
      margin: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
    }

    th, td {
      padding: 4px 6px;
      border-bottom: none;
      font-feature-settings: "tnum" 1;
      font-size: 0.85rem;
      line-height: 1.25;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      text-align: left;
      font-weight: 700;
      color: #334155;
    }

    td {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      vertical-align: top;
      text-align: right;
    }

    td.numeric {
      text-align: right;
    }

    td.center {
      text-align: center;
      font-weight: 600;
      color: #475569;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .summary {
      margin-top: 4px;
      font-size: 0.98rem;
      color: #334155;
    }

    .note {
      color: #475569;
      margin-top: 8px;
    }

    .match {
      background: transparent;
      color: #7f1d1d;
    }
  </style>
</head>
<body>
  <h1>Floors of fractions</h1>
  <p class="note">Inspired by <a href="https://youtu.be/hfzxkHGME50" target="_blank" rel="noopener">https://youtu.be/hfzxkHGME50</a></p>
  <div id="tableContainer">
    <table>
      <thead>
        <tr>
          <th>x</th>
          <th>x/2</th>
          <th>x/3</th>
          <th>x/5</th>
          <th>⌊x/2⌋ + ⌊x/3⌋ + ⌊x/5⌋</th>
          <th>Result</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    const rows = document.getElementById('rows');
    const tableContainer = document.getElementById('tableContainer');

    let nextX = 0;
    const rowBuffer = 15;
    const chunkSize = 50;
    const tolerance = 1e-9;

    function formatFraction(value) {
      return value.toFixed(3);
    }

    function floorValue(value) {
      return Math.floor(value);
    }

    function createRow(x) {
      const a = floorValue(x / 2);
      const b = floorValue(x / 3);
      const c = floorValue(x / 5);
      const total = a + b + c;

      const row = document.createElement('tr');

      const cellX = document.createElement('td');
      cellX.textContent = x;
      row.appendChild(cellX);

      const cellA = document.createElement('td');
      cellA.textContent = formatFraction(x / 2);
      row.appendChild(cellA);

      const cellB = document.createElement('td');
      cellB.textContent = formatFraction(x / 3);
      row.appendChild(cellB);

      const cellC = document.createElement('td');
      cellC.textContent = formatFraction(x / 5);
      row.appendChild(cellC);

      const formulaCell = document.createElement('td');
      formulaCell.textContent = `${a} + ${b} + ${c}`;
      row.appendChild(formulaCell);

      const resultCell = document.createElement('td');
      resultCell.textContent = total;
      row.appendChild(resultCell);

      if (Math.abs(x - total) < tolerance) {
        row.classList.add('match');
      }

      rows.appendChild(row);
    }

    function appendRows(count) {
      for (let i = 0; i < count; i += 1) {
        createRow(nextX);
        nextX += 1;
      }
    }

    function getVisibleRows() {
      const firstRow = rows.querySelector('tr');
      if (!firstRow) {
        return 5;
      }
      const rowHeight = firstRow.getBoundingClientRect().height || 24;
      return Math.max(5, Math.floor(tableContainer.clientHeight / rowHeight));
    }

    function initializeRows() {
      const visibleRows = getVisibleRows();
      appendRows(visibleRows + 10);
    }

    function handleScroll() {
      const { scrollTop, clientHeight, scrollHeight } = tableContainer;
      if (scrollHeight - (scrollTop + clientHeight) < 300) {
        appendRows(10);
      }
    }

    tableContainer.addEventListener('scroll', handleScroll);
    initializeRows();
  </script>
</body>
</html>
