<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Sum Calculator</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      color: #111;
      background: #f7f8fb;
    }

    h1, p {
      margin: 0 0 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px 16px;
      align-items: center;
      max-width: 480px;
      margin-bottom: 20px;
    }

    label {
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font: inherit;
      box-sizing: border-box;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: white;
      box-shadow: 0 2px 16px rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      overflow: hidden;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
      font-feature-settings: "tnum" 1;
    }

    th {
      background: #f1f5f9;
      text-align: left;
      font-weight: 700;
      color: #334155;
    }

    td {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      vertical-align: top;
    }

    td.numeric {
      text-align: right;
    }

    td.center {
      text-align: center;
      font-weight: 600;
      color: #475569;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .summary {
      margin-top: 4px;
      font-size: 0.98rem;
      color: #334155;
    }

    .note {
      color: #475569;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Floor sum formula</h1>
  <p class="summary">Calculate <strong>⌊x/2⌋ + ⌊x/3⌋ + ⌊x/5⌋</strong> for a sequence of real values starting at <strong>x = 0</strong>.</p>

  <div class="controls">
    <label for="increment">Increment</label>
    <input id="increment" type="number" min="0.001" step="0.001" value="0.1" />

    <label for="steps">Number of steps</label>
    <input id="steps" type="number" min="1" step="1" value="10" />
  </div>

  <p class="note">Change either value to update the rows immediately.</p>

  <table>
    <thead>
      <tr>
        <th>x</th>
        <th>⌊x/2⌋</th>
        <th></th>
        <th>⌊x/3⌋</th>
        <th></th>
        <th>⌊x/5⌋</th>
        <th></th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const incrementInput = document.getElementById('increment');
    const stepsInput = document.getElementById('steps');
    const rows = document.getElementById('rows');

    function formatValue(value) {
      const text = value.toFixed(6).replace(/(?:\.\d+?)0+$/, '$1').replace(/\.$/, '');
      return text;
    }

    function floorValue(value) {
      return Math.floor(value);
    }

    function render() {
      const increment = parseFloat(incrementInput.value) || 0.1;
      const steps = Math.max(1, parseInt(stepsInput.value, 10) || 1);
      rows.innerHTML = '';

      for (let index = 0; index < steps; index += 1) {
        const x = index * increment;
        const a = floorValue(x / 2);
        const b = floorValue(x / 3);
        const c = floorValue(x / 5);
        const total = a + b + c;

        const row = document.createElement('tr');

        const cellX = document.createElement('td');
        cellX.textContent = `x=${formatValue(x)}`;
        row.appendChild(cellX);

        const cellA = document.createElement('td');
        cellA.textContent = `⌊${formatValue(x / 2)}⌋`;
        row.appendChild(cellA);

        const plus1 = document.createElement('td');
        plus1.className = 'center';
        plus1.textContent = '+';
        row.appendChild(plus1);

        const cellB = document.createElement('td');
        cellB.textContent = `⌊${formatValue(x / 3)}⌋`;
        row.appendChild(cellB);

        const plus2 = document.createElement('td');
        plus2.className = 'center';
        plus2.textContent = '+';
        row.appendChild(plus2);

        const cellC = document.createElement('td');
        cellC.textContent = `⌊${formatValue(x / 5)}⌋`;
        row.appendChild(cellC);

        const equals = document.createElement('td');
        equals.className = 'center';
        equals.textContent = '=';
        row.appendChild(equals);

        const result = document.createElement('td');
        result.textContent = `${a} + ${b} + ${c} = ${total}`;
        row.appendChild(result);

        rows.appendChild(row);
      }
    }

    incrementInput.addEventListener('input', render);
    stepsInput.addEventListener('input', render);
    render();
  </script>
</body>
</html>
